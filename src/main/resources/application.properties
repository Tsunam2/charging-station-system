# 1. 对接 MySQL 数据库配置
spring.datasource.url=jdbc:mysql://localhost:3306/charging_system?useSSL=false&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true
spring.datasource.username=root
# ⚠️请注意：把下面这行改成你刚才安装 MySQL 时自己设置的 root 密码！
spring.datasource.password=654123
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# 2. 对接 JPA 自动建表与 SQL 打印（对应第四章的静态结构设计）
# update 代表只要你在 Java 里写好类，启动项目时它会自动在 MySQL 里帮你把表建好
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true

# 3. 对接 Redis 内存引擎配置（对应高频叫号排队两级队列）
spring.data.redis.host=localhost
spring.data.redis.port=6379
# 本地免密运行，密码留空即可
spring.data.redis.password=