# 1. 对接 MySQL 数据库配置
spring.datasource.url=jdbc:mysql://localhost:3306/charging_system?useSSL=false&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true
spring.datasource.username=root
# ⚠️请注意：把下面这行改成你刚才安装 MySQL 时自己设置的 root 密码！
spring.datasource.password=654123
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# 2. 对接 JPA 自动建表与 SQL 打印（沙盒模式核心修改点）
# 🎯 修改为 create：每次项目启动时自动删表重建，保证测试环境绝对纯净
spring.jpa.hibernate.ddl-auto=create
# 🎯 修改为 false：关闭 SQL 打印，防止“时空跃迁”极速推演时海量日志卡死控制台
spring.jpa.show-sql=false
# 关闭懒加载警告，提升沙盒运行性能
spring.jpa.open-in-view=false

# 3. 对接 Redis 内存引擎配置（对应高频叫号排队两级队列）
spring.data.redis.host=localhost
spring.data.redis.port=6379
# 本地免密运行，密码留空即可
spring.data.redis.password=